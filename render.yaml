services:
  - type: web
    name: job-dashboard
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildCommand: |
      pip install -r requirements.txt &&
      cd ../frontend && npm ci && npm run build
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: job-dashboard-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://job-dashboard-3yrw.onrender.com"]'
      # Gmail token: base64-encode secrets/token.json and paste here
      # base64 -i backend/secrets/token.json | tr -d '\n'
      - key: GMAIL_TOKEN_JSON
        sync: false   # set manually in Render dashboard (secret)
      - key: GMAIL_TOKEN_FILE
        value: /tmp/gmail_token.json

databases:
  - name: job-dashboard-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
